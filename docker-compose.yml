      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS:
        INTERNAL://:9092,
        CONTROLLER://:9093,
        EXTERNAL://:19092
      KAFKA_CONTROLLER_QUORUM_VOTERS:
        1@kafka-01:9093,
        2@kafka-02:9093,
        3@kafka-03:9093
      KAFKA_ADVERTISED_LISTENERS:
        INTERNAL://kafka-03:9092,
